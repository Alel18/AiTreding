name: AI Trading Bot

on:
  schedule:
    - cron: '0 1 * * *'

  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Library
        run: |
          pip install yfinance
          pip install pandas
          pip install requests
          pip install ta

      - name: Run Python File
        run: python bot_trading.py
